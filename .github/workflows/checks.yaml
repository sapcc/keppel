name: Checks
"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'
  workflow_dispatch: {}
permissions:
  checks: write
  contents: read
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          check-latest: true
          go-version: 1.26.3
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
      - name: Delete pre-installed shellcheck
        run: sudo rm -f "$(which shellcheck)"
      - name: Run shellcheck
        run: make run-shellcheck
      - name: Dependency Licenses Review
        run: make check-dependency-licenses
      - name: Check for spelling errors
        uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45 # v1
        env:
          CLICOLOR: "1"
      - name: Check if source code files have license header
        run: make check-addlicense
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
