name: Checks
"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'
  workflow_dispatch: {}
permissions:
  checks: write
  contents: read
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          check-latest: true
          go-version: 1.26.4
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
      - name: Delete pre-installed shellcheck
        run: sudo rm -f "$(which shellcheck)"
      - name: Run shellcheck
        run: make run-shellcheck
      - name: Dependency Licenses Review
        run: make check-dependency-licenses
      - name: Check for spelling errors
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1
        env:
          CLICOLOR: "1"
      - name: Check if source code files have license header
        run: make check-addlicense
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
